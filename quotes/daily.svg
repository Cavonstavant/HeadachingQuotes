<svg xmlns="http://www.w3.org/2000/svg" width="800" height="290" viewBox="0 0 800 290">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="28"
    fill="#000000"
    font-weight="400"
    letter-spacing="-0.01em">
    <tspan x="60" y="88">“Somebody wondering whether or not to jump</tspan>
    <tspan x="60" y="126">Decides at last that the only thing left</tspan>
    <tspan x="60" y="164">to do”</tspan>
  </text>
  <text
    font-family="Courier New, Courier, monospace"
    font-size="11"
    fill="#666666"
    font-weight="400"
    text-transform="uppercase"
    letter-spacing="0.1em">
    <tspan x="60" y="233">The Pavement is my Pillow Talk  —  Headache (PLZ)</tspan>
    <tspan x="60" y="251">The Head Hurts but the Heart Knows the Truth</tspan>
  </text>
</svg>
