<svg xmlns="http://www.w3.org/2000/svg" width="800" height="366" viewBox="0 0 800 366">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="28"
    fill="#000000"
    font-weight="400"
    letter-spacing="-0.01em">
    <tspan x="60" y="88">“We will think thoughts that will be</tspan>
    <tspan x="60" y="126">thoughts we would have never imagined we</tspan>
    <tspan x="60" y="164">could think</tspan>
    <tspan x="60" y="201">Not in any past that any thought of ours</tspan>
    <tspan x="60" y="239">could ever reach”</tspan>
  </text>
  <text
    font-family="Courier New, Courier, monospace"
    font-size="11"
    fill="#666666"
    font-weight="400"
    text-transform="uppercase"
    letter-spacing="0.1em">
    <tspan x="60" y="309">The Pavement is my Pillow Talk  —  Headache (PLZ)</tspan>
    <tspan x="60" y="327">The Head Hurts but the Heart Knows the Truth</tspan>
  </text>
</svg>
